events { worker_connections 1024; }

http {
    upstream backend {
        server attendance-backend:3000;
    }

    upstream frontend {
        server attendance-frontend:80;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name attendance.seven-chefs.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name attendance.seven-chefs.com;

        ssl_certificate /etc/letsencrypt/live/attendance.seven-chefs.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/attendance.seven-chefs.com/privkey.pem;

        # API requests → backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 100M;
            # large size for backup file uploads
        }

        # Everything else → frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
